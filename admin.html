<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="admin.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>🛍 Chic Couture Admin</h2>

    <div class="nav-right">
        <button onclick="loadProducts()">Products</button>
        <button onclick="loadCustomers()">Customers</button>
        <button onclick="loadDashboard()">Dashboard</button>

        <span class="badge" id="notifBadge">0</span>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <!-- LEFT PANEL (FORM) -->
    <div class="panel">
        <h3>Add Product</h3>

        <input id="name" placeholder="Product name">
        <input id="price" placeholder="Price">
        <input id="category" placeholder="Category">
        <input id="image" placeholder="Image URL">
        <textarea id="description" placeholder="Description"></textarea>

        <button onclick="addProduct()">➕ Create Product</button>
    </div>

    <!-- RIGHT PANEL (OUTPUT) -->
    <div class="panel wide">
        <div id="output"></div>
        <canvas id="chart"></canvas>
    </div>

</div>

<script src="admin.js"></script>
</body>
</html>

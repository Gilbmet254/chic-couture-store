<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; }

    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }

    .card {
      background:white;
      padding:15px;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    table {
      width:100%;
      background:white;
      border-collapse:collapse;
      margin-top:20px;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:left;
    }

    button {
      padding:5px 10px;
      border:none;
      cursor:pointer;
    }

    .delete { background:red; color:white; }
    .edit { background:orange; color:white; }
  </style>
</head>

<body>

<h1>🛍 Chic Couture Admin Panel</h1>

<div class="grid">
  <div class="card">
    <h3>Total Products</h3>
    <p id="productCount">0</p>
  </div>

  <div class="card">
    <h3>Total Orders</h3>
    <p id="orderCount">0</p>
  </div>

  <div class="card">
    <h3>Revenue</h3>
    <p id="revenue">$0</p>
  </div>
</div>

<h2>Products</h2>
<table id="productsTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Price</th>
      <th>Category</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const API = "https://chic-couture-store-api.onrender.com";

// LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(API + "/products");
  const data = await res.json();

  document.getElementById("productCount").innerText = data.length;

  let table = document.querySelector("#productsTable tbody");
  table.innerHTML = "";

  data.forEach(p => {
    table.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>$${p.price}</td>
        <td>${p.category}</td>
        <td>
          <button class="delete">Delete</button>
        </td>
      </tr>
    `;
  });
}

loadProducts();
</script>

</body>
</html>
